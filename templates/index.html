<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Morioo MMS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* ── Reset ──────────────────────────────────────────────────────────── */
        * { box-sizing: border-box; }

        /* ── BASE : Mobile portrait (défaut / mobile-first) ─────────────────
           Sur téléphone en portrait on scrolle verticalement.               */
        body {
            background-color: #0d0802;
            color: #ffeedd;
            font-family: 'Courier New', monospace;
            margin: 0; padding: 6px;
            display: flex; flex-direction: column; gap: 6px;
            min-height: 100dvh;
            overflow-y: auto;
        }

        /* ── Top bar ─────────────────────────────────────────────────────── */
        #top-bar {
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0; padding: 2px 6px;
        }
        #title   { font-size: clamp(0.85em, 3.5vw, 1.4em); color: #d4a373; font-weight: bold; cursor: pointer; }
        #clock   { font-size: clamp(0.85em, 3.5vw, 1.6em); color: #8e6f43; font-weight: bold; letter-spacing: 2px; }
        #gps-indicator {
            font-size: clamp(0.6em, 2vw, 0.8em); font-weight: bold;
            padding: 3px 8px; border-radius: 6px; border: 1px solid #3d2510;
        }
        #gps-indicator.fix   { color: #38b000; border-color: #38b000; }
        #gps-indicator.nofix { color: #8e6f43; border-color: #3d2510; }

        /* ── Conteneur principal : 1 colonne en mobile ──────────────────── */
        .main-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }
        .left-panel { display: flex; flex-direction: column; gap: 8px; }

        /* ── Jauges ──────────────────────────────────────────────────────── */
        .gauges-container {
            display: flex; justify-content: space-around; align-items: center;
            background-color: #160e05; border: 3px solid #8e6f43;
            border-radius: 14px; padding: 10px 5px; min-height: 110px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
        }
        .gauge-box {
            text-align: center; font-weight: bold; color: #d4a373;
            font-size: clamp(0.6em, 2vw, 1.1em); width: 32%;
        }
        canvas { display: block; margin: 0 auto; }

        /* ── Boutons relais ──────────────────────────────────────────────── */
        .lights-container { display: flex; gap: 8px; width: 100%; }
        .btn-toggle {
            background-color: #5c1d06; color: #ffeedd;
            border: 3px solid #8e6f43;
            padding: clamp(8px, 2.5vw, 18px) clamp(4px, 1vw, 12px);
            font-size: clamp(0.72em, 2vw, 1.1em);
            border-radius: 10px; cursor: pointer; font-weight: bold;
            flex: 1; text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
        }
        .btn-toggle.active { background-color: #2b5c06; box-shadow: 0 0 15px #38b000; }
        .btn-toggle.underwater-btn.active { background-color: #005f73; box-shadow: 0 0 15px #0a9396; }

        /* ── ODO ─────────────────────────────────────────────────────────── */
        .odo-container {
            display: flex; align-items: center; gap: 8px;
            background-color: #160e05; border: 3px solid #8e6f43;
            border-radius: 10px; padding: 8px 12px; width: 100%;
        }
        .odo-label { color: #8e6f43; font-size: clamp(0.55em, 1.5vw, 0.75em); text-transform: uppercase; margin-bottom: 2px; }
        .odo-value { color: #fff; font-size: clamp(0.8em, 2.5vw, 1.2em); font-weight: bold; }
        .odo-block { flex: 1; text-align: center; border-right: 1px solid #3d2510; }
        .odo-block:last-of-type { border-right: none; }
        .btn-reset {
            background-color: #3d1010; color: #ffeedd; border: 2px solid #8e4343;
            padding: 7px 10px; font-size: clamp(0.65em, 1.8vw, 0.85em);
            border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap;
        }
        .btn-reset:active { background-color: #8e4343; }

        /* ── Carte ───────────────────────────────────────────────────────── */
        #map {
            width: 100%;
            /* Mobile portrait : hauteur proportionnelle à la largeur */
            height: 55vw; min-height: 180px; max-height: 380px;
            border: 3px solid #8e6f43; border-radius: 14px; background-color: #0c1117;
        }

        /* ── Modules bar ─────────────────────────────────────────────────── */
        #modules-bar { display: flex; flex-direction: column; gap: 8px; width: 100%; }

        /* ── Barre audio ─────────────────────────────────────────────────── */
        .bottom-audio-bar {
            display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
            background-color: #1e1206; border: 3px solid #8e6f43;
            border-radius: 14px; padding: 8px;
        }
        .track-info {
            font-size: clamp(0.9em, 3vw, 1.4em); color: #fff; font-weight: bold;
            padding: 2px 6px 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            border-bottom: 1px solid #3d2510;
        }
        .audio-controls { display: flex; justify-content: space-between; gap: 8px; }
        .btn-audio {
            background-color: #3d2510; color: #d4a373; border: 2px solid #8e6f43;
            padding: clamp(8px, 2vw, 15px) 0; font-size: clamp(1.2em, 4vw, 1.8em);
            border-radius: 10px; cursor: pointer; flex: 1;
            display: flex; justify-content: center; align-items: center;
        }
        .btn-audio:active { background-color: #d4a373; color: #221407; }
        .playlists { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .btn-pl {
            background-color: #0d0802; color: #d4a373; border: 2px solid #8e6f43;
            padding: 8px 4px; font-size: clamp(0.65em, 1.8vw, 0.85em);
            border-radius: 6px; font-weight: bold; text-align: center; cursor: pointer;
        }

        /* Les styles des modules (ex. anchor watch) sont injectés par leur propre JS. */

        /* ── PAYSAGE COMPACT : téléphone/tablette paysage (640–899px) ──────
           Deux colonnes, tout en hauteur, pas de scroll.                    */
        @media (min-width: 640px) and (max-width: 899px) and (orientation: landscape) {
            body { overflow: hidden; height: 100vh; padding: 4px; gap: 4px; }

            .main-container {
                grid-template-columns: 1fr 1fr;
                flex: 1; min-height: 0;
            }
            .left-panel { height: 100%; }
            .gauges-container { flex: 1; min-height: 0; padding: 6px 3px; }

            #map { height: 100%; max-height: none; }

            .bottom-audio-bar {
                display: grid; grid-template-columns: 1.2fr 1.5fr 1fr;
                height: 17vh; padding: 6px; gap: 8px; align-items: center;
            }
            .track-info { border-bottom: none; border-right: 1px solid #3d2510; padding-bottom: 0; font-size: 1em; }
            .playlists { grid-template-columns: 1fr 1fr; height: 100%; align-content: center; }
            .btn-audio { padding: 8px 0; font-size: 1.3em; }
            .btn-pl    { font-size: 0.75em; }
        }

        /* ── DESKTOP / TABLETTE PAYSAGE (≥ 900px) ──────────────────────────
           Layout original : 2 colonnes, overflow:hidden, tout tient en vue.*/
        @media (min-width: 900px) {
            body { overflow: hidden; height: 100vh; padding: 8px; gap: 6px; }

            .main-container {
                grid-template-columns: 1.1fr 1.1fr;
                flex: 1; min-height: 0;
            }
            .left-panel { height: 100%; }
            .gauges-container { flex: 1; min-height: 0; padding: 15px 5px; }

            #map { height: 100%; max-height: none; }

            .bottom-audio-bar {
                display: grid; grid-template-columns: 1.2fr 1.5fr 1fr;
                height: 18vh; padding: 10px; gap: 15px; align-items: center;
            }
            .track-info { font-size: 1.4em; border-bottom: none; border-right: 1px solid #3d2510; padding-bottom: 0; }
            .playlists { grid-template-columns: 1fr 1fr; height: 100%; align-content: center; }
            .btn-audio { padding: 15px 0; font-size: 1.8em; }
            .btn-pl    { font-size: 0.85em; }
        }

        /* ── AUTORADIO CARPURIDE 1280×480 (large ET court, ex. ≥ 1100px, ≤ 540px)
           Tout ultra-compact : jauges ~110px, barre audio ~70px, gaps réduits. */
        @media (min-width: 1100px) and (max-height: 540px) {
            body { padding: 3px 5px; gap: 2px; }

            #top-bar    { padding: 0 6px; }
            #title      { font-size: 0.95em; }
            #clock      { font-size: 0.95em; letter-spacing: 1px; }
            #gps-indicator { font-size: 0.62em; padding: 2px 5px; }

            /* Colonnes : panneau gauche 1fr, carte 1.6fr → plus de place pour la carte */
            .main-container {
                grid-template-columns: 1fr 1.6fr;
                flex: 1; min-height: 0; gap: 6px;
            }
            .left-panel { height: 100%; gap: 4px; }
            .gauges-container { flex: 1; min-height: 0; padding: 4px 2px; }
            .gauge-box  { font-size: 0.68em; }

            #map { height: 100%; max-height: none; }

            .btn-toggle {
                padding: 5px 4px; font-size: 0.76em;
                border-width: 2px; border-radius: 7px;
            }

            .odo-container  { padding: 4px 8px; }
            .odo-value      { font-size: 0.80em; }
            .odo-label      { font-size: 0.50em; margin-bottom: 0; }
            .btn-reset      { padding: 4px 7px; font-size: 0.68em; }

            /* Barre audio ultra-plate, tout sur une ligne */
            .bottom-audio-bar {
                display: grid;
                grid-template-columns: 1.4fr 1.6fr 1fr;
                height: 70px;
                padding: 4px 8px; gap: 8px;
                align-items: center; border-radius: 10px;
            }
            .track-info {
                font-size: 0.88em;
                border-bottom: none; border-right: 1px solid #3d2510;
                padding: 0 8px 0 0;
            }
            .btn-audio  { padding: 3px 0; font-size: 1.15em; }
            .playlists  { grid-template-columns: repeat(4, 1fr); height: auto; gap: 4px; }
            .btn-pl     { font-size: 0.65em; padding: 4px 2px; }
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div id="title" onclick="location.reload()" title="Recharger la page">BOESCH 510</div>
        <div id="gps-indicator" class="nofix">🛰 NO FIX</div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="main-container">
        <div class="left-panel">
            <div class="gauges-container">
                <div class="gauge-box">
                    <canvas id="gauge-vitesse" width="220" height="220"></canvas>
                    <div>VITESSE (km/h)</div>
                </div>
                <div class="gauge-box">
                    <canvas id="gauge-profondeur" width="220" height="220"></canvas>
                    <div>PROFONDEUR (m)</div>
                </div>
                <div class="gauge-box">
                    <canvas id="gauge-batterie" width="220" height="220"></canvas>
                    <div>BATTERIE (V)</div>
                </div>
            </div>

            <div class="lights-container">
                <button id="btn-pump" class="btn-toggle" onclick="toggleSwitch('pompe_de_cale')">💧 POMPE CALE : OFF</button>
                <button id="btn-underwater" class="btn-toggle underwater-btn" onclick="toggleSwitch('lumieres_sous_marines')">🌊 FEUX SOUS-MARINS : OFF</button>
            </div>

            <!-- Zone où les modules optionnels (modules/*.py) injectent leur UI -->
            <div id="modules-bar"></div>

            <div class="odo-container">
                <div class="odo-block">
                    <div class="odo-label">Distance</div>
                    <div class="odo-value" id="odo-km">0.00 km</div>
                </div>
                <div class="odo-block">
                    <div class="odo-label">Nautiques</div>
                    <div class="odo-value" id="odo-nm">0.00 nm</div>
                </div>
                <div class="odo-block">
                    <div class="odo-label">Temps nav.</div>
                    <div class="odo-value" id="odo-temps">0h 00m</div>
                </div>
                <button class="btn-reset" onclick="resetTrip()">RESET</button>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <div class="bottom-audio-bar">
        <div class="track-info" id="track-title">Spotify Déconnecté</div>
        <div class="audio-controls">
            <button class="btn-audio" onclick="spotifyAction('previous')">⏮</button>
            <button class="btn-audio" onclick="spotifyAction('play')">▶</button>
            <button class="btn-audio" onclick="spotifyAction('pause')">⏸</button>
            <button class="btn-audio" onclick="spotifyAction('next')">⏭</button>
        </div>
        <div class="playlists">
            <button class="btn-pl" onclick="playPlaylist('37i9dQZF1DX4sWSpwq3LiO')">☕ Cruise Chill</button>
            <button class="btn-pl" onclick="playPlaylist('37i9dQZF1DX10zKzsJ2jva')">⚡ V8 Power</button>
            <button class="btn-pl" onclick="playPlaylist('24hgp0ejYeN6iVKTC5qebK')">🌊 Boat Vibes</button>
            <button class="btn-pl" onclick="playPlaylist('37i9dQZF1DX4dyzvuaRJ0n')">🎸 Rock Classics</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);

        // --- CARTE MAP ---
        var map = L.map('map', {zoomControl: false}).setView([50.4901, 5.1002], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png').addTo(map);

        var boatMarker = L.circleMarker([50.4901, 5.1002], {
            color: '#ff4500', fillColor: '#ff4500', fillOpacity: 1, radius: 9
        }).addTo(map);

        var trailLine = L.polyline([], {
            color: '#ff4500', weight: 2, opacity: 0.5
        }).addTo(map);

        // --- SUIVI DU BATEAU (façon Waze) ---
        let followBoat = true;
        let lastPos = null;
        let recenterBtn = null;

        function setFollow(on) {
            followBoat = on;
            if (recenterBtn) recenterBtn.style.display = on ? 'none' : 'block';
        }

        const RecenterControl = L.Control.extend({
            options: { position: 'bottomright' },
            onAdd: function () {
                const btn = L.DomUtil.create('button', '');
                btn.innerHTML = '🎯 Recentrer';
                btn.title = 'Recentrer sur le bateau';
                btn.style.cssText = 'background:#160e05;color:#d4a373;border:2px solid #8e6f43;'
                    + 'border-radius:10px;padding:12px 16px;font-size:1em;font-weight:bold;'
                    + 'cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.7);display:none;';
                L.DomEvent.disableClickPropagation(btn);
                L.DomEvent.on(btn, 'click', function () {
                    setFollow(true);
                    if (lastPos) map.setView(lastPos, map.getZoom());
                });
                recenterBtn = btn;
                return btn;
            }
        });
        map.addControl(new RecenterControl());

        map.on('dragstart zoomstart', function () { setFollow(false); });

        // --- DESSIN DES JAUGES RÉTRO ---
        // Les textes sont mis à l'échelle du canvas pour rester lisibles
        // quelle que soit la taille calculée par resizeGauges().
        function drawGauge(canvasId, value, minVal, maxVal, colorNeedle) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = canvas.width * 0.44;

            // Tailles de texte proportionnelles au canvas
            const valFontSize  = Math.round(canvas.width * 0.16);
            const tickFontSize = Math.round(canvas.width * 0.073);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Fond noir du cadran
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
            ctx.fillStyle = '#050301';
            ctx.fill();
            ctx.lineWidth = Math.max(2, canvas.width * 0.022);
            ctx.strokeStyle = '#8e6f43';
            ctx.stroke();

            // Arc de graduation
            const startAngle = 0.75 * Math.PI;
            const endAngle   = 2.25 * Math.PI;
            ctx.beginPath();
            ctx.arc(cx, cy, radius - canvas.width * 0.063, startAngle, endAngle);
            ctx.lineWidth = Math.max(1, canvas.width * 0.014);
            ctx.strokeStyle = '#d4a373';
            ctx.stroke();

            // Repères min / max
            ctx.fillStyle = '#aa8259';
            ctx.font = `bold ${tickFontSize}px Courier New`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const off = radius - canvas.width * 0.14;
            ctx.fillText(minVal, cx - off, cy + off);
            ctx.fillText(maxVal, cx + off, cy + off);

            // Aiguille
            const percent = Math.min(1, Math.max(0, (value - minVal) / (maxVal - minVal)));
            const needleAngle = startAngle + percent * (endAngle - startAngle);
            const tip  = radius - canvas.width * 0.082;
            const base = canvas.width * 0.027;
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(needleAngle);
            ctx.beginPath();
            ctx.moveTo(0, base);
            ctx.lineTo(tip, 0);
            ctx.lineTo(0, -base);
            ctx.fillStyle = colorNeedle;
            ctx.fill();
            ctx.restore();

            // Moyeu
            ctx.beginPath();
            ctx.arc(cx, cy, canvas.width * 0.05, 0, 2 * Math.PI);
            ctx.fillStyle = '#8e6f43';
            ctx.fill();

            // Valeur numérique (par-dessus tout)
            ctx.save();
            ctx.shadowColor = '#000000';
            ctx.shadowBlur  = Math.round(canvas.width * 0.027);
            ctx.fillStyle   = '#ffffff';
            ctx.font        = `bold ${valFontSize}px Courier New`;
            ctx.textAlign   = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(value.toFixed(1), cx, cy + canvas.width * 0.045);
            ctx.restore();
        }

        // --- REFRESH STATUS (1s) ---
        async function refreshData() {
            try {
                let data = await fetch('/api/status').then(r => r.json());
                let vitesseKmh = data.vitesse * 1.852;

                drawGauge('gauge-vitesse',    vitesseKmh,    0,  50, '#ff4500');
                drawGauge('gauge-profondeur', data.profondeur, 0, 10, '#00bfff');
                drawGauge('gauge-batterie',   data.batterie,  10, 15, batteryColor(data.batterie));

                document.getElementById('track-title').innerText = data.music_artist
                    ? `${data.music_title} - ${data.music_artist}`
                    : data.music_title;

                if (data.lat && data.lon) {
                    var newPos = [data.lat, data.lon];
                    lastPos = newPos;
                    boatMarker.setLatLng(newPos);
                    if (followBoat) map.setView(newPos, map.getZoom(), { animate: false });
                }

                let gpsEl = document.getElementById('gps-indicator');
                if (data.gps_fix) {
                    gpsEl.textContent = '🛰 GPS FIX';
                    gpsEl.className = 'fix';
                } else {
                    gpsEl.textContent = '🛰 NO FIX';
                    gpsEl.className = 'nofix';
                }

                if (data.trip) {
                    document.getElementById('odo-km').innerText    = data.trip.km.toFixed(2) + ' km';
                    document.getElementById('odo-nm').innerText    = data.trip.nm.toFixed(2) + ' nm';
                    let s = data.trip.secondes;
                    let h = Math.floor(s / 3600);
                    let m = Math.floor((s % 3600) / 60);
                    document.getElementById('odo-temps').innerText = h + 'h ' + String(m).padStart(2, '0') + 'm';
                }

                let btnPump = document.getElementById('btn-pump');
                if (data.pompe_de_cale) {
                    btnPump.innerText = `💧 POMPE : ${data.pompe_timer}s`;
                    btnPump.classList.add('active');
                } else {
                    btnPump.innerText = '💧 POMPE CALE : OFF';
                    btnPump.classList.remove('active');
                }

                let btnUnder = document.getElementById('btn-underwater');
                if (data.lumieres_sous_marines) {
                    btnUnder.innerText = '🌊 FEUX SOUS-MARINS : ON';
                    btnUnder.classList.add('active');
                } else {
                    btnUnder.innerText = '🌊 FEUX SOUS-MARINS : OFF';
                    btnUnder.classList.remove('active');
                }

            } catch (e) {}
        }

        // --- REFRESH TRACE (5s) ---
        async function refreshTrail() {
            try {
                let trail = await fetch('/api/trail').then(r => r.json());
                trailLine.setLatLngs(trail);
            } catch (e) {}
        }

        function batteryColor(v) {
            if (v >= 12.6) return '#38b000';
            if (v >= 12.0) return '#f4a100';
            return '#e63946';
        }

        // --- TAILLE DES CANVAS DYNAMIQUE ---
        // Calcule la taille optimale à partir du container réel,
        // fonctionne quelle que soit la taille d'écran ou l'orientation.
        function resizeGauges() {
            const container = document.querySelector('.gauges-container');
            if (!container) return;
            // Largeur disponible par jauge (3 jauges, ~30% chacune) et hauteur dispo
            const byWidth  = Math.floor((container.offsetWidth  - 30) / 3 * 0.88);
            const byHeight = Math.floor( container.offsetHeight * 0.80);
            // Écran autoradio large + court : on plafonne à 110px
            const isCarScreen = window.innerWidth >= 1100 && window.innerHeight <= 540;
            const maxSize = isCarScreen ? 110 : 220;
            const size    = Math.max(60, Math.min(byWidth, byHeight, maxSize));
            ['gauge-vitesse', 'gauge-profondeur', 'gauge-batterie'].forEach(id => {
                const c = document.getElementById(id);
                if (c) { c.width = size; c.height = size; }
            });
        }

        // Recalcul au chargement et à chaque changement d'orientation / taille
        resizeGauges();
        window.addEventListener('resize', () => {
            resizeGauges();
            // Invalider la carte Leaflet (elle ne se redimensionne pas seule)
            map.invalidateSize();
            refreshData();
        });

        // Dessin initial
        drawGauge('gauge-vitesse',    0,    0,  50, '#ff4500');
        drawGauge('gauge-profondeur', 0,    0,  10, '#00bfff');
        drawGauge('gauge-batterie',   12.0, 10, 15, '#38b000');

        setInterval(refreshData,  1000);
        setInterval(refreshTrail, 5000);
        refreshTrail();

        // Chargement automatique des frontends de modules (modules/*.py).
        fetch('/api/modules').then(r => r.json()).then(mods => {
            (mods || []).forEach(m => {
                if (m.ui_js) {
                    const sc = document.createElement('script');
                    sc.src = m.ui_js;
                    document.body.appendChild(sc);
                }
            });
        }).catch(() => {});

        // --- ACTIONS ---
        const _switchLock = {};
        async function toggleSwitch(device) {
            if (_switchLock[device]) return;
            _switchLock[device] = true;
            await fetch(`/api/switch/${device}`, { method: 'POST' });
            refreshData();
            setTimeout(() => { _switchLock[device] = false; }, 800);
        }
        async function resetTrip() {
            await fetch('/api/trip/reset', { method: 'POST' });
            refreshData();
        }
        let _spotifyLock = false;
        async function spotifyAction(action) {
            if (_spotifyLock) return;
            _spotifyLock = true;
            const btn = event.currentTarget;
            btn.style.opacity = '0.4';
            await fetch(`/api/spotify/${action}`, { method: 'POST' });
            setTimeout(() => { btn.style.opacity = ''; _spotifyLock = false; }, 600);
        }
        async function playPlaylist(id) {
            if (_spotifyLock) return;
            _spotifyLock = true;
            const btn = event.currentTarget;
            btn.style.opacity = '0.4';
            await fetch(`/api/spotify/playlist?playlist_id=${id}`, { method: 'POST' });
            setTimeout(() => { btn.style.opacity = ''; _spotifyLock = false; }, 600);
        }
    </script>
</body>
