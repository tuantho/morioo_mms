name: CI

# Filet anti-régression : vérifie que l'app compile et démarre (smoke test)
# à chaque push sur main et à chaque pull request.
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt httpx

      - name: Compile check (main + modules)
        run: python -m compileall -q main.py modules

      - name: Smoke test (démarre l'app + teste cœur et modules)
        run: python tests/smoke_test.py
